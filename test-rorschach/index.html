<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Rorschach - Placa 01</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
      cursor: none;
    }

    .stage {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: none;
    }

    .plate {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    #pointer {
      position: fixed;
      top: 0;
      left: 0;
      width: 90px;
      height: 90px;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-4px, -4px);
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.6));
      will-change: transform;
    }
  </style>
</head>
<body>
  <div class="stage">
    <img class="plate" src="img/01.png" alt="Placa 01" />
  </div>

  <svg id="pointer" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path
      d="M 8 6 L 8 78 L 26 62 L 38 92 L 52 86 L 40 58 L 62 58 Z"
      fill="#ff2d2d"
      stroke="#ffffff"
      stroke-width="4"
      stroke-linejoin="round"
    />
  </svg>

  <script>
    const pointer = document.getElementById('pointer');
    let x = window.innerWidth / 2;
    let y = window.innerHeight / 2;

    function move(e) {
      x = e.clientX;
      y = e.clientY;
      pointer.style.transform = `translate(${x - 4}px, ${y - 4}px)`;
    }

    window.addEventListener('mousemove', move, { passive: true });

    // Oculta la flecha si el mouse sale de la ventana
    window.addEventListener('mouseleave', () => {
      pointer.style.opacity = '0';
    });
    window.addEventListener('mouseenter', () => {
      pointer.style.opacity = '1';
    });
  </script>
</body>
</html>
