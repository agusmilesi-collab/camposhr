<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Rorschach</title>
  <style>
    :root {
      --stroke-color: #ff2d2d;
      --stroke-width: 6px;
      --ui-bg: rgba(20, 20, 20, 0.75);
      --ui-border: rgba(255, 255, 255, 0.15);
      --ui-text: #f2f2f2;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
      cursor: none;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .plate {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    #drawCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .ui {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: var(--ui-bg);
      border: 1px solid var(--ui-border);
      border-radius: 999px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 20;
      color: var(--ui-text);
      font-size: 14px;
      user-select: none;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--ui-text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s ease, transform 0.1s ease;
    }

    .nav-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.18);
    }

    .nav-btn:active:not(:disabled) {
      transform: scale(0.94);
    }

    .nav-btn:disabled {
      opacity: 0.3;
    }

    .counter {
      min-width: 52px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    .counter .total { opacity: 0.5; }

    #pointer {
      position: fixed;
      top: 0;
      left: 0;
      width: 56px;
      height: 56px;
      pointer-events: none;
      z-index: 30;
      will-change: transform;
      transition: opacity 0.15s ease;
    }
  </style>
</head>
<body>
  <div class="stage">
    <img id="plate" class="plate" src="img/1.png" alt="Placa 1" />
  </div>

  <canvas id="drawCanvas"></canvas>

  <div class="ui">
    <button class="nav-btn" id="prevBtn" aria-label="Anterior">&#9664;</button>
    <span class="counter"><span id="currentNum">1</span><span class="total"> / 12</span></span>
    <button class="nav-btn" id="nextBtn" aria-label="Siguiente">&#9654;</button>
  </div>

  <svg id="pointer" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3a3a3a"/>
        <stop offset="100%" stop-color="#000000"/>
      </linearGradient>
      <filter id="arrowShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.55"/>
      </filter>
    </defs>
    <g filter="url(#arrowShadow)">
      <path
        d="M 14 8
           Q 10 6 11 12
           L 18 72
           Q 19 78 24 74
           L 36 62
           L 46 86
           Q 48 91 53 89
           L 60 86
           Q 65 84 63 79
           L 53 56
           L 70 54
           Q 76 53 72 48
           Z"
        fill="url(#arrowGrad)"
        stroke="#ffffff"
        stroke-width="3"
        stroke-linejoin="round"
      />
    </g>
  </svg>

  <script>
    // ---------------- Config ----------------
    const TOTAL = 12;
    const STROKE_TTL = 1000;  // ms visibles al 100% luego de soltar
    const FADE_MS = 300;      // ms de fade out
    const STROKE_WIDTH = 6;
    const STROKE_COLOR = '#000000';

    // ---------------- Estado ----------------
    let currentPlate = 1;
    let strokes = [];       // { points: [{x,y}], endTime|null }
    let currentStroke = null;
    let drawing = false;

    // ---------------- Nodos ----------------
    const plateImg = document.getElementById('plate');
    const currentNumEl = document.getElementById('currentNum');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const pointer = document.getElementById('pointer');
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');

    // ---------------- Canvas ----------------
    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ---------------- Navegación ----------------
    function setPlate(n) {
      if (n < 1 || n > TOTAL || n === currentPlate) return;
      currentPlate = n;
      plateImg.src = `img/${n}.png`;
      plateImg.alt = `Placa ${n}`;
      currentNumEl.textContent = n;
      prevBtn.disabled = (n === 1);
      nextBtn.disabled = (n === TOTAL);
      strokes = [];
      currentStroke = null;
      drawing = false;
    }

    prevBtn.addEventListener('click', () => setPlate(currentPlate - 1));
    nextBtn.addEventListener('click', () => setPlate(currentPlate + 1));
    prevBtn.disabled = true;

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft')  setPlate(currentPlate - 1);
      if (e.key === 'ArrowRight') setPlate(currentPlate + 1);
    });

    // ---------------- Puntero + Dibujo ----------------
    function movePointer(x, y) {
      pointer.style.transform = `translate(${x - 10}px, ${y - 6}px)`;
    }

    function isOverUI(target) {
      return !!(target && target.closest && target.closest('.ui'));
    }

    document.addEventListener('mousedown', (e) => {
      if (isOverUI(e.target)) return;
      if (e.button !== 0) return;
      drawing = true;
      currentStroke = { points: [{ x: e.clientX, y: e.clientY }], endTime: null };
      strokes.push(currentStroke);
    });

    document.addEventListener('mousemove', (e) => {
      movePointer(e.clientX, e.clientY);
      if (drawing && currentStroke) {
        currentStroke.points.push({ x: e.clientX, y: e.clientY });
      }
    }, { passive: true });

    function finishStroke() {
      if (currentStroke) {
        currentStroke.endTime = performance.now() + STROKE_TTL;
      }
      currentStroke = null;
      drawing = false;
    }

    document.addEventListener('mouseup', finishStroke);
    window.addEventListener('blur', finishStroke);

    window.addEventListener('mouseleave', () => { pointer.style.opacity = '0'; });
    window.addEventListener('mouseenter', () => { pointer.style.opacity = '1'; });

    // ---------------- Render loop ----------------
    function render() {
      const now = performance.now();
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      strokes = strokes.filter(s => !(s.endTime && now > s.endTime + FADE_MS));

      ctx.lineWidth = STROKE_WIDTH;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = STROKE_COLOR;

      for (const s of strokes) {
        if (s.points.length < 2) continue;
        let alpha = 1;
        if (s.endTime && now > s.endTime) {
          alpha = Math.max(0, 1 - (now - s.endTime) / FADE_MS);
        }
        ctx.globalAlpha = alpha;
        ctx.beginPath();
        ctx.moveTo(s.points[0].x, s.points[0].y);
        for (let i = 1; i < s.points.length; i++) {
          ctx.lineTo(s.points[i].x, s.points[i].y);
        }
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);
  </script>
</body>
</html>
